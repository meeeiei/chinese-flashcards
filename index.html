<!DOCTYPE html>
<!--
  DOCTYPE tells the browser: "this is modern HTML5".
  Without it, browsers fall back to quirky old behaviour.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!--
    charset="UTF-8" lets the browser display Chinese characters correctly.
    Without this, 你好 might show as garbled symbols.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- viewport makes the page look right on phones, not zoomed-out tiny -->

  <title>Chinese Flashcards</title>

  <!--
    We load two fonts from Google Fonts (requires internet connection):
    - Lato: clean, readable sans-serif for all UI text
    - Noto Serif SC: a serif font designed specifically for Chinese characters
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet" />

  <!-- Our own CSS file for all visual styling -->
  <link rel="stylesheet" href="style.css?v=2" />
</head>

<body>

  <!-- ===================== HEADER ===================== -->
  <header>
    <h1>汉字卡片 <span>Chinese Flashcards</span></h1>
    <div id="theme-picker" aria-label="Choose a theme">
      <button class="theme-swatch" data-theme-name="ink"  title="Ink &amp; Parchment" style="background:#b5251c;" onclick="setTheme('ink')"></button>
      <button class="theme-swatch" data-theme-name="dark" title="Dark Mode"           style="background:#9d8cff;" onclick="setTheme('dark')"></button>
      <button class="theme-swatch" data-theme-name="neon" title="Neon Futuristic"     style="background:#00ffe7;" onclick="setTheme('neon')"></button>
      <button class="theme-swatch" data-theme-name="cute" title="Cute Mode"           style="background:#e87ea1;" onclick="setTheme('cute')"></button>
    </div>
  </header>

  <!-- ===================== NAVIGATION TABS ===================== -->
  <!--
    Two buttons that switch between the two "screens" of the app.
    onclick calls switchTab() in app.js with either 'add' or 'review'.
    The 'active' class on the first button means it's the default selected tab.
  -->
  <nav>
    <button id="tab-add"     class="tab-btn active" onclick="switchTab('add')">Add Card</button>
    <button id="tab-review"  class="tab-btn"        onclick="switchTab('review')">Review Cards</button>
    <button id="tab-quiz"    class="tab-btn"        onclick="switchTab('quiz')">Quiz</button>
    <button id="tab-decks"   class="tab-btn"        onclick="switchTab('decks')">Decks</button>
    <button id="tab-explore" class="tab-btn"        onclick="switchTab('explore')">Explore</button>
  </nav>

  <!-- ===================== ADD CARD SECTION ===================== -->
  <!--
    This section is visible by default. app.js hides it when you click "Review Cards".
  -->
  <section id="section-add">

    <h2 id="add-heading">Add a New Card</h2>

    <!--
      A <form> groups related inputs together.
      onsubmit="addCard(event)" means: when the user clicks Submit,
      run the addCard() function in app.js and pass it the form event.
    -->
    <form onsubmit="addCard(event)">

      <!-- Chinese Character field -->
      <div class="field">
        <label for="input-character">Chinese Character(s)</label>
        <input
          type="text"
          id="input-character"
          placeholder="e.g. 你好"
          required
        />
        <!--
          'required' means the browser won't submit the form if this is empty.
          'placeholder' shows hint text that disappears when you start typing.
          'for' on the label links it to 'id' on the input — clicking the label focuses the box.
        -->
      </div>

      <!-- Pinyin field -->
      <div class="field">
        <label for="input-pinyin">Pinyin</label>
        <input
          type="text"
          id="input-pinyin"
          placeholder="e.g. nǐ hǎo"
          required
        />
      </div>

      <!-- English Meaning field -->
      <div class="field">
        <label for="input-meaning">English Meaning</label>
        <input
          type="text"
          id="input-meaning"
          placeholder="e.g. hello / how are you"
          required
        />
      </div>

      <!-- Tags (checkboxes + free-text new tag) -->
      <div class="field">
        <label>Tags <span class="hint">(check existing · or type a new one below)</span></label>
        <div id="tag-checkboxes" class="checkbox-group">
          <!-- populated by renderTagCheckboxes() each time the Add tab opens -->
        </div>
        <input
          type="text"
          id="input-new-tag"
          placeholder="New tag (e.g. Numbers, Colours…)"
        />
      </div>

      <button type="submit" id="submit-btn" class="btn-primary">Add Card</button>

    </form>

    <!-- This paragraph is hidden by default; app.js shows it briefly after a card is saved -->
    <p id="add-confirmation" class="confirmation" style="display:none;">
      Card saved!
    </p>

    <!-- Deck management: export and import -->
    <div class="deck-bar">
      <button class="btn-nav" onclick="exportDeck()">&#8595; Export Deck</button>
      <label class="btn-nav deck-import-label">
        &#8593; Import Deck
        <input type="file" accept=".json" onchange="importDeck(event)" style="display:none;" />
      </label>
    </div>
    <p id="import-msg" class="confirmation" style="display:none;"></p>

  </section>


  <!-- ===================== REVIEW CARDS SECTION ===================== -->
  <!--
    Hidden by default. app.js shows this when you click "Review Cards".
  -->
  <section id="section-review" style="display:none;">

    <h2>Review Cards</h2>

    <!-- Tag filter buttons — app.js populates these dynamically -->
    <div id="filter-bar">
      <!--
        These buttons are created and inserted by app.js (renderFilterButtons).
        We just provide the container here.
      -->
    </div>

    <!-- Empty-deck message, shown when there are no cards to display -->
    <p id="empty-message" style="display:none;">
      No cards yet. Go to "Add Card" to create your first one!
    </p>

    <!-- ---- THE FLASHCARD ---- -->
    <!--
      This is the flip card structure:
        .card          → outer fixed-size box (clips the animation)
        .card-inner    → the piece that actually rotates 180 degrees
        .card-front    → what you see first (character + pinyin)
        .card-back     → what is revealed after flip (meaning)

      onclick="flipCard()" in app.js toggles the .flipped CSS class,
      which triggers the CSS rotation animation in style.css.
    -->
    <div id="card-area" style="display:none;">

      <div class="card" onclick="flipCard()">
        <div class="card-inner" id="card-inner">

          <div class="card-front">

            <!-- Bear mascot: always on the card front, costume changes with theme -->
            <div class="bear-wrapper">
              <svg class="bear-svg" viewBox="0 0 120 156" xmlns="http://www.w3.org/2000/svg">

                <!-- Ears (drawn first — behind head) -->
                <circle cx="26" cy="37" r="15" fill="var(--bear-body)"/>
                <circle cx="94" cy="37" r="15" fill="var(--bear-body)"/>
                <circle cx="26" cy="37" r="9"  fill="var(--bear-inner)"/>
                <circle cx="94" cy="37" r="9"  fill="var(--bear-inner)"/>

                <!-- Head -->
                <circle cx="60" cy="55" r="34" fill="var(--bear-body)"/>

                <!-- Muzzle -->
                <ellipse cx="60" cy="72" rx="18" ry="13" fill="var(--bear-tummy)"/>

                <!-- Eyes -->
                <circle cx="47" cy="47" r="5.5" fill="var(--bear-eye)"/>
                <circle cx="73" cy="47" r="5.5" fill="var(--bear-eye)"/>
                <circle cx="49" cy="45" r="2.2" fill="white" opacity="0.85"/>
                <circle cx="75" cy="45" r="2.2" fill="white" opacity="0.85"/>

                <!-- Nose -->
                <ellipse cx="60" cy="65" rx="5.5" ry="4.5" fill="var(--bear-eye)"/>

                <!-- Smile -->
                <path d="M 53 75 Q 60 82 67 75" fill="none" stroke="var(--bear-eye)"
                      stroke-width="2" stroke-linecap="round"/>

                <!-- Body -->
                <ellipse cx="60" cy="117" rx="31" ry="30" fill="var(--bear-body)"/>

                <!-- Tummy -->
                <ellipse cx="60" cy="117" rx="21" ry="20" fill="var(--bear-tummy)"/>

                <!-- Left arm (holding sign) -->
                <path d="M 32 102 Q 20 110 15 124" stroke="var(--bear-body)" stroke-width="13"
                      fill="none" stroke-linecap="round"/>
                <circle cx="15" cy="124" r="9" fill="var(--bear-body)"/>

                <!-- Right arm (holding sign) -->
                <path d="M 88 102 Q 100 110 105 124" stroke="var(--bear-body)" stroke-width="13"
                      fill="none" stroke-linecap="round"/>
                <circle cx="105" cy="124" r="9" fill="var(--bear-body)"/>

                <!-- Sign board -->
                <g class="bear-sign-board">
                  <rect x="8" y="108" width="104" height="30" rx="6"
                        fill="var(--sign-bg)" stroke="var(--sign-border)" stroke-width="1.5"/>
                  <text x="60" y="123" text-anchor="middle" dominant-baseline="middle"
                        font-family="Lato, sans-serif" font-size="10" font-weight="700"
                        fill="var(--sign-text)">Do you know?</text>
                </g>

                <!-- Feet -->
                <ellipse cx="43" cy="150" rx="18" ry="7" fill="var(--bear-body)"/>
                <ellipse cx="77" cy="150" rx="18" ry="7" fill="var(--bear-body)"/>

                <!-- COSTUME: Ink — mortarboard cap + red scarf -->
                <g class="costume-ink">
                  <rect x="30" y="22" width="60" height="7" rx="3" fill="#1a1208"/>
                  <polygon points="60,4 35,24 85,24" fill="#1a1208"/>
                  <line x1="83" y1="13" x2="92" y2="26" stroke="#b5251c" stroke-width="2.5"/>
                  <circle cx="93" cy="29" r="4" fill="#b5251c"/>
                  <path d="M 44 86 Q 60 94 76 86" stroke="#b5251c" stroke-width="6"
                        fill="none" stroke-linecap="round"/>
                </g>

                <!-- COSTUME: Dark — wizard hat + cloak -->
                <g class="costume-dark">
                  <ellipse cx="60" cy="22" rx="28" ry="6" fill="#22223b"/>
                  <polygon points="60,0 36,24 84,24" fill="#2d2d4a"/>
                  <text x="60" y="17" text-anchor="middle" font-size="10" fill="#9d8cff">&#9733;</text>
                  <path d="M 33 117 Q 27 136 40 152 L 60 145 L 80 152 Q 93 136 87 117"
                        fill="#22223b" opacity="0.88"/>
                </g>

                <!-- COSTUME: Neon — cyan visor + cyber collar -->
                <g class="costume-neon">
                  <rect x="33" y="41" width="54" height="12" rx="6" fill="#0a0a0f" opacity="0.92"/>
                  <rect x="33" y="41" width="54" height="4"  rx="2" fill="#00ffe7" opacity="0.8"/>
                  <rect x="38" y="84" width="44" height="9"  rx="4" fill="#111118"/>
                  <rect x="38" y="84" width="44" height="3.5" rx="2" fill="#00ffe7" opacity="0.7"/>
                </g>

                <!-- COSTUME: Cute — bow + blush + heart -->
                <g class="costume-cute">
                  <path d="M 79 27 Q 89 19 95 27 Q 89 35 79 27 Z" fill="#e87ea1"/>
                  <path d="M 111 27 Q 101 19 95 27 Q 101 35 111 27 Z" fill="#e87ea1"/>
                  <circle cx="95" cy="27" r="5" fill="#fff5fa"/>
                  <ellipse cx="37" cy="65" rx="8" ry="5" fill="#e87ea1" opacity="0.35"/>
                  <ellipse cx="83" cy="65" rx="8" ry="5" fill="#e87ea1" opacity="0.35"/>
                  <path d="M 56 113 Q 52 107 47 110 Q 43 116 56 125 Q 69 116 73 110 Q 68 107 64 113 Q 61 107 56 113 Z"
                        fill="#e87ea1" opacity="0.65"/>
                </g>

              </svg>
            </div>

            <p class="card-hint">tap to reveal meaning</p>
            <button class="btn-speak" onclick="speakCard(event)" title="Hear pronunciation">&#128266;</button>
            <p class="card-character" id="card-character">你好</p>
            <p class="card-pinyin"   id="card-pinyin">nǐ hǎo</p>
            <div class="card-tags"   id="card-tags-front"></div>
          </div>

          <div class="card-back">
            <canvas class="card-back-canvas" id="card-back-canvas"></canvas>
            <p class="card-hint">meaning</p>
            <p class="card-meaning" id="card-meaning">hello</p>
            <div class="card-tags"  id="card-tags-back"></div>
          </div>

        </div>
      </div>

      <!-- Card counter (e.g. "Card 2 of 7") -->
      <p id="card-counter" class="card-counter">Card 1 of 1</p>

      <!-- Navigation and delete controls -->
      <div class="card-controls">
        <button class="btn-nav"    onclick="prevCard()">&#8592; Prev</button>
        <button class="btn-delete" onclick="editCard()">Edit</button>
        <button class="btn-delete" onclick="deleteCard()">Delete</button>
        <button class="btn-nav"    onclick="nextCard()">Next &#8594;</button>
      </div>

      <!-- Know-it / Not-yet buttons -->
      <div class="know-controls">
        <button class="btn-noyet" id="btn-noyet" onclick="markKnown(false)">&#10007; Not yet</button>
        <button class="btn-know"  id="btn-know"  onclick="markKnown(true)">&#10003; Know it</button>
      </div>

      <!-- Live progress counter -->
      <p id="progress-line" class="progress-line"></p>

    </div>

  </section>


  <!-- ===================== QUIZ SECTION ===================== -->
  <section id="section-quiz" style="display:none;">

    <h2>Quiz</h2>

    <!-- Start screen -->
    <div id="quiz-start">
      <p id="quiz-start-msg" class="quiz-start-msg"></p>
      <div id="quiz-direction" class="quiz-direction">
        <button id="dir-forward" class="filter-btn active-filter"
                onclick="setQuizMode('forward')">Chinese &#8594; English</button>
        <button id="dir-reverse" class="filter-btn"
                onclick="setQuizMode('reverse')">English &#8594; Chinese</button>
      </div>
      <button class="btn-primary" onclick="startQuiz()">Start Quiz &#8594;</button>
    </div>

    <!-- Question screen: shows character + pinyin, hides meaning -->
    <div id="quiz-question" style="display:none;">
      <p id="quiz-counter" class="card-counter"></p>
      <div class="quiz-card">
        <p class="card-character" id="quiz-character"></p>
        <p class="card-pinyin"    id="quiz-pinyin"></p>
      </div>
      <p id="quiz-meaning" class="quiz-meaning-display"></p>
      <button id="quiz-reveal-btn" class="btn-primary"
              onclick="revealAnswer()" style="display:none;">Show Answer</button>
      <form id="quiz-forward-form" class="quiz-form" onsubmit="submitAnswer(event)">
        <input type="text" id="quiz-answer"
               placeholder="Type the English meaning…"
               autocomplete="off" required />
        <button type="submit" class="btn-primary">Check &#10003;</button>
      </form>
    </div>

    <!-- Feedback screen: shown after each answer -->
    <div id="quiz-feedback" style="display:none;">
      <p id="quiz-verdict" class="quiz-verdict"></p>
      <p id="quiz-reveal"  class="quiz-reveal"></p>
      <button id="quiz-next-btn" class="btn-nav" onclick="nextQuestion()">Next &#8594;</button>
      <div id="quiz-self-report" class="know-controls" style="display:none;">
        <button class="btn-noyet" onclick="selfReport(false)">&#10007; Didn't get it</button>
        <button class="btn-know"  onclick="selfReport(true)">&#10003; Got it</button>
      </div>
    </div>

    <!-- Done screen: shown after all cards are answered -->
    <div id="quiz-done" style="display:none;">
      <p id="quiz-score" class="quiz-score"></p>
      <div class="card-controls" style="margin-top:24px;">
        <button class="btn-nav" onclick="startQuiz()">Try Again</button>
        <button class="btn-nav" onclick="switchTab('review')">Back to Review</button>
      </div>
    </div>

  </section>


  <!-- ===================== STARTER DECKS SECTION ===================== -->
  <section id="section-decks" style="display:none;">
    <h2>Starter Decks</h2>
    <p class="decks-intro">Pick a deck and tap "Load" to add all its cards to your collection.</p>
    <div id="decks-grid"></div>
    <p id="deck-load-msg" class="confirmation" style="display:none;"></p>
  </section>


  <!-- ===================== EXPLORE SECTION ===================== -->
  <section id="section-explore" style="display:none;">
    <h2>Explore</h2>
    <div class="explore-subnav">
      <button id="explore-btn-families" class="explore-nav-btn active-explore"
              onclick="switchExplore('families')">Character Families</button>
      <button id="explore-btn-sounds"   class="explore-nav-btn"
              onclick="switchExplore('sounds')">Sound-Alikes</button>
    </div>
    <div id="explore-content"></div>
  </section>


  <!--
    The script tag goes at the very bottom of <body>.
    By the time the browser reaches this line, all the HTML above already exists,
    so app.js can safely find elements by their id.
  -->
  <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3/dist/index.js"></script>
  <script src="families.js?v=1"></script>
  <script src="soundalikes.js?v=1"></script>
  <script src="decks.js?v=1"></script>
  <script src="app.js?v=5"></script>

  <!-- Theme switching lives here too so it always works regardless of app.js caching -->
  <script>
    function setTheme(t) {
      document.documentElement.setAttribute("data-theme", t);
      try { localStorage.setItem("flashcards-theme", t); } catch(e) {}
      document.querySelectorAll(".theme-swatch").forEach(function(b) {
        b.classList.toggle("active-swatch", b.dataset.themeName === t);
      });
    }
    (function() {
      var saved = "";
      try { saved = localStorage.getItem("flashcards-theme") || "ink"; } catch(e) { saved = "ink"; }
      setTheme(saved);
    })();
  </script>

</body>
</html>
